name: CI

on:
  workflow_call:
  pull_request:
    branches:
      - main

jobs:
  run-checks:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        # only LTS versions
        node-version: [18.x, 20.x, 22.x, 24.x]
        fastify-version: [4.x, 5.x]
        exclude:
          - node-version: 18.x
            fastify-version: 5.x

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci
      # --no-save keeps this install ephemeral in CI and avoids changing package.json/package-lock.json.
      - name: Install Fastify ${{ matrix.fastify-version }}
        run: npm install --no-save fastify@${{ matrix.fastify-version }}
      - run: npm run build
      - run: npm run lint
      - run: npm test
