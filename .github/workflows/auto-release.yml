name: Release on push to main

on:
  push:
    branches:
      - main

# Prevents two pushes from bumping at the same time; the second run waits for the first
concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Check if version changed and bump if needed
        id: version
        run: |
          V_BEFORE=$(git show "${{ github.event.before }}:package.json" 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version") || echo ""
          V_AFTER=$(node -p "require('./package.json').version")
          if [ -n "$V_BEFORE" ] && [ "$V_BEFORE" != "$V_AFTER" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "version=$V_AFTER" >> $GITHUB_OUTPUT
          else
            if [ -n "$V_BEFORE" ] && [ "$V_BEFORE" = "$V_AFTER" ]; then
              npm version patch --no-git-tag-version
            fi
            VERSION=$(node -p "require('./package.json').version")
            echo "version_changed=false" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      # When release PR was merged: version already bumped on main → create tag and release
      - name: Create tag and release
        if: steps.version.outputs.version_changed == 'true'
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" 2>/dev/null; then
            echo "Release v${{ steps.version.outputs.version }} already exists, skipping"
            exit 0
          fi
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          gh release create "v${{ steps.version.outputs.version }}" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # When regular PR was merged: version not bumped → create release PR with auto-merge
      - name: Create release branch and push
        if: steps.version.outputs.version_changed == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/v${{ steps.version.outputs.version }}"
          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore(release): v${{ steps.version.outputs.version }}"
          git push origin --delete "release/v${{ steps.version.outputs.version }}" 2>/dev/null || true
          git push -u origin "release/v${{ steps.version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR and enable auto-merge
        if: steps.version.outputs.version_changed == 'false'
        run: |
          gh pr create \
            --base main \
            --head "release/v${{ steps.version.outputs.version }}" \
            --title "chore(release): v${{ steps.version.outputs.version }}" \
            --body "Automated release version bump"
          gh pr merge "release/v${{ steps.version.outputs.version }}" --auto --squash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
