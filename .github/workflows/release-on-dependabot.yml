name: Release on Dependabot merge

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-and-release:
    runs-on: ubuntu-latest
    # Only run when the push is a merge from a Dependabot PR; skip our own version-bump commit
    if: |
      contains(github.event.head_commit.message, 'Merge pull request') &&
      contains(github.event.head_commit.message, 'from dependabot/') &&
      !contains(github.event.head_commit.message, 'chore(release)')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Bump patch version
        run: npm version patch --no-git-tag-version
        env:
          npm_config_yes: "true"

      - name: Get new version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore(release): v${{ steps.version.outputs.version }}"
          git push

      - name: Create tag and release
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          gh release create "v${{ steps.version.outputs.version }}" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
