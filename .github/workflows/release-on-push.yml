name: Release on push to main

on:
  push:
    branches:
      - main

# Prevents two pushes from bumping at the same time; the second run waits for the first
concurrency:
  group: release-main
  # Queues runs instead of cancelling them
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Check if package version changed
        id: check
        run: |
          # Get version before and after this push; skip bump if we can't read before (e.g. first push)
          V_BEFORE=$(git show "${{ github.event.before }}:package.json" 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version") || echo ""
          V_AFTER=$(node -p "require('./package.json').version")
          echo "before=$V_BEFORE" >> $GITHUB_OUTPUT
          echo "after=$V_AFTER" >> $GITHUB_OUTPUT
          if [ -n "$V_BEFORE" ] && [ "$V_BEFORE" = "$V_AFTER" ]; then
            echo "should_bump=true" >> $GITHUB_OUTPUT
          else
            echo "should_bump=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump patch version
        run: npm version patch --no-git-tag-version
        env:
          npm_config_yes: "true"
        if: steps.check.outputs.should_bump == 'true'

      - name: Get new version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        if: steps.check.outputs.should_bump == 'true'

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore(release): v${{ steps.version.outputs.version }}"
          git push
        if: steps.check.outputs.should_bump == 'true'

      - name: Create tag and release
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          gh release create "v${{ steps.version.outputs.version }}" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: steps.check.outputs.should_bump == 'true'
